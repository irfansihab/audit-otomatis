<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Audit Internal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .loader { border-top-color: #3b82f6; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Animasi transisi tab */
        .tab-content { transition: opacity 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-6xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-4">Sistem Audit Internal AI</h1>
            <div class="inline-flex bg-gray-200 rounded-lg p-1 space-x-1">
                <button id="btnTabAudit" class="px-6 py-2.5 rounded-md text-sm font-semibold text-gray-700 bg-white shadow transition-all">📝 Analisis Audit</button>
                <button id="btnTabKnowledge" class="px-6 py-2.5 rounded-md text-sm font-semibold text-gray-500 hover:text-gray-700 hover:bg-white/50 transition-all">📚 Update Knowledge</button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            
            <div class="w-full md:w-1/3 bg-white p-6 rounded-xl shadow-lg border border-gray-100 h-fit">
                
                <div id="formAuditContainer" class="tab-content block">
                    <h2 class="text-xl font-bold text-gray-900 mb-6 border-b pb-2 border-blue-500">Mulai Analisis Dokumen</h2>
                    <form id="auditForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Upload Dokumen (PDF/Word)</label>
                            <input type="file" id="fileAudit" required accept=".pdf,.doc,.docx"
                                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 border border-gray-200 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jenis Audit</label>
                            <select id="jenisAudit" required
                                class="mt-1 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                                <option value="PBJ">Pengadaan Barang & Jasa (PBJ)</option>
                                <option value="Kinerja">Audit Kinerja & Anggaran</option>
                                <option value="SPIP">Manajemen Risiko & SPIP</option>
                                <option value="Keuangan">Laporan Keuangan</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Sasaran / Fokus Audit</label>
                            <textarea id="sasaranAudit" rows="3" required placeholder="Misal: Cek indikasi mark-up harga..."
                                class="mt-1 block w-full p-3 border border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md"></textarea>
                        </div>
                        <button type="submit" id="submitAuditBtn"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            Buat Kertas Kerja Audit
                        </button>
                    </form>
                </div>

                <div id="formKnowledgeContainer" class="tab-content hidden">
                    <h2 class="text-xl font-bold text-gray-900 mb-6 border-b pb-2 border-emerald-500">Upload Aturan Baru</h2>
                    <form id="knowledgeForm" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Upload File (.pdf / .md)</label>
                            <input type="file" id="fileKnowledge" required accept=".pdf,.md"
                                class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 border border-gray-200 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Jenis Knowledge</label>
                            <select id="jenisKnowledge" required
                                class="mt-1 block w-full pl-3 pr-10 py-2 text-base border border-gray-300 focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 sm:text-sm rounded-md">
                                <option value="pengadaan">Pengadaan</option>
                                <option value="kinerja">Kinerja</option>
                                <option value="manajemen_risiko">Manajemen Risiko</option>
                                <option value="laporan_keuangan">Laporan Keuangan</option>
                            </select>
                        </div>
                        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 rounded-md">
                            <p class="text-xs text-yellow-700">Pastikan dokumen bersih dari password. Sistem akan memotong teks otomatis ke dalam Supabase.</p>
                        </div>
                        <button type="submit" id="submitKnowledgeBtn"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                            Suntikkan ke Database AI
                        </button>
                    </form>
                </div>

                <div id="loadingStatus" class="hidden mt-6 text-center">
                    <div class="loader border-4 border-gray-200 rounded-full w-8 h-8 mx-auto mb-2"></div>
                    <p id="loadingText" class="text-sm text-gray-500 animate-pulse">Sedang memproses...</p>
                </div>
            </div>

            <div class="w-full md:w-2/3 bg-white p-8 rounded-xl shadow-lg border border-gray-100 min-h-[500px]">
                <h3 id="resultTitle" class="text-xl font-bold text-gray-900 mb-4 border-b pb-2">Hasil Output</h3>
                
                <div id="resultContainer" class="prose max-w-none text-gray-700 hidden">
                    </div>
                
                <div id="emptyState" class="flex flex-col items-center justify-center h-full text-gray-400 opacity-60 mt-20">
                    <svg class="w-20 h-20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <p>Pilih menu di samping untuk memulai.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // ==============================================================================
        // ⚠️ PENTING: ISI KEDUA URL WEBHOOK INI DENGAN URL N8N ANDA
        // ==============================================================================
        
        // 1. URL untuk Agen Audit (Workflow yang sudah Anda buat sebelumnya)
        const N8N_WEBHOOK_AUDIT = "https://inspektorat2.app.n8n.cloud/webhook/8add8307-dc82-4c07-96e2-4d46b514a44d"; 
        
        // 2. URL untuk Workflow Upload Knowledge (Workflow baru yang khusus upload ke Supabase)
        const N8N_WEBHOOK_KNOWLEDGE = "https://inspektorat2.app.n8n.cloud/webhook/97a4c7da-c329-4f4f-91f2-d3a821ea3eed"; 

        // ==============================================================================

        // DOM Elements
        const tabAudit = document.getElementById('btnTabAudit');
        const tabKnowledge = document.getElementById('btnTabKnowledge');
        const formAuditContainer = document.getElementById('formAuditContainer');
        const formKnowledgeContainer = document.getElementById('formKnowledgeContainer');
        const resultTitle = document.getElementById('resultTitle');

        const formAudit = document.getElementById('auditForm');
        const formKnowledge = document.getElementById('knowledgeForm');
        
        const loadingStatus = document.getElementById('loadingStatus');
        const loadingText = document.getElementById('loadingText');
        const resultContainer = document.getElementById('resultContainer');
        const emptyState = document.getElementById('emptyState');

        // Logic Ganti Tab
        function switchTab(tab) {
            if (tab === 'audit') {
                tabAudit.classList.replace('text-gray-500', 'text-gray-700');
                tabAudit.classList.replace('hover:bg-white/50', 'bg-white');
                tabAudit.classList.add('shadow');
                
                tabKnowledge.classList.replace('text-gray-700', 'text-gray-500');
                tabKnowledge.classList.replace('bg-white', 'hover:bg-white/50');
                tabKnowledge.classList.remove('shadow');

                formAuditContainer.classList.remove('hidden');
                formKnowledgeContainer.classList.add('hidden');
                resultTitle.innerText = "Kertas Kerja Audit (KKA)";
            } else {
                tabKnowledge.classList.replace('text-gray-500', 'text-gray-700');
                tabKnowledge.classList.replace('hover:bg-white/50', 'bg-white');
                tabKnowledge.classList.add('shadow');
                
                tabAudit.classList.replace('text-gray-700', 'text-gray-500');
                tabAudit.classList.replace('bg-white', 'hover:bg-white/50');
                tabAudit.classList.remove('shadow');

                formKnowledgeContainer.classList.remove('hidden');
                formAuditContainer.classList.add('hidden');
                resultTitle.innerText = "Status Ingestion (Upload)";
            }
            
            // Reset state sebelah kanan
            resultContainer.classList.add('hidden');
            emptyState.classList.remove('hidden');
        }

        tabAudit.addEventListener('click', () => switchTab('audit'));
        tabKnowledge.addEventListener('click', () => switchTab('knowledge'));

        // Fungsi Umum untuk Menjalankan Request
        async function sendDataToN8n(url, formData, loadMessage, btnId) {
            const btn = document.getElementById(btnId);
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            loadingText.innerText = loadMessage;
            loadingStatus.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            emptyState.classList.add('hidden');

            try {
                const response = await fetch(url, { method: 'POST', body: formData });
                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                const data = await response.json();
                
                const outputText = data.output || data.text || data.message || JSON.stringify(data);
                resultContainer.innerHTML = marked.parse(outputText);
                resultContainer.classList.remove('hidden');
            } catch (error) {
                console.error('Error:', error);
                resultContainer.innerHTML = `<div class="p-4 bg-red-50 text-red-700 rounded-md border border-red-200">Terjadi kesalahan: ${error.message}</div>`;
                resultContainer.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                loadingStatus.classList.add('hidden');
            }
        }

        // Event Submit Form Audit (Sama seperti sebelumnya)
        formAudit.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('data', document.getElementById('fileAudit').files[0]);
            formData.append('jenis_audit', document.getElementById('jenisAudit').value);
            formData.append('sasaran_audit', document.getElementById('sasaranAudit').value);
            
            sendDataToN8n(N8N_WEBHOOK_AUDIT, formData, "Agen AI sedang memeriksa dokumen. Mohon tunggu...", "submitAuditBtn");
        });

        // Event Submit Form Knowledge (Baru)
        formKnowledge.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('data', document.getElementById('fileKnowledge').files[0]);
            formData.append('jenis_knowledge', document.getElementById('jenisKnowledge').value); // Akan mengirim: pengadaan, kinerja, dll
            
            sendDataToN8n(N8N_WEBHOOK_KNOWLEDGE, formData, "Mengunggah dan memotong teks ke Supabase. Mohon tunggu...", "submitKnowledgeBtn");
        });
    </script>
</body>
</html>
